<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Whiskey Cocktail Menü</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4efe6;
            color: #333;
            padding: 16px;
            padding-bottom: 40px;
        }
        header {
            text-align: center;
            margin-bottom: 24px;
            padding-top: 10px;
        }
        header h1 { font-size: 26px; color: #2c1a0e; font-weight: 800; margin-bottom: 4px; letter-spacing: 0.5px; }
        header p { font-size: 14px; color: #7a5c3a; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 16px;
            max-width: 620px;
            margin: 0 auto;
        }
        @media (max-width: 360px) {
            .grid-container { grid-template-columns: repeat(2, 1fr); gap: 12px; }
        }
        .card {
            background: #fff8ee;
            border-radius: 14px;
            box-shadow: 0 4px 14px rgba(80,40,0,0.10);
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #e5d5b0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card:active { transform: scale(0.95); box-shadow: 0 2px 6px rgba(80,40,0,0.12); }

        .card-img-wrap {
            width: 100%;
            height: 120px;
            border-radius: 10px;
            overflow: hidden;
            background: #e8d9c0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .card-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .card-img-wrap .spinner {
            width: 32px; height: 32px;
            border: 3px solid #c9a97a;
            border-top-color: #7a4e2d;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .card-img-wrap .load-err { font-size: 32px; }

        .card-title {
            font-size: 13px;
            font-weight: 700;
            color: #2c1a0e;
            margin-top: 8px;
            line-height: 1.3;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(20,10,0,0.55);
            z-index: 1000;
            justify-content: center;
            align-items: flex-end;
            animation: fadeIn 0.2s ease-out;
        }
        .modal.active { display: flex; }
        .modal-content {
            background-color: #fff8ee;
            width: 100%;
            max-width: 500px;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            padding: 24px;
            box-shadow: 0 -8px 28px rgba(80,40,0,0.18);
            animation: slideUp 0.3s cubic-bezier(0.1, 0.8, 0.3, 1);
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
            border-bottom: 1px solid #e0c99a;
            padding-bottom: 12px;
        }
        .modal-title { font-size: 20px; font-weight: 800; color: #2c1a0e; }
        .close-btn {
            background: #ede0c8;
            border: none;
            width: 36px; height: 36px;
            border-radius: 50%;
            font-size: 18px;
            font-weight: bold;
            color: #7a4e2d;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .modal-img-wrap {
            width: 100%;
            height: 200px;
            border-radius: 14px;
            overflow: hidden;
            background: #e8d9c0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
        }
        .modal-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .modal-img-wrap .spinner {
            width: 40px; height: 40px;
            border: 4px solid #c9a97a;
            border-top-color: #7a4e2d;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .modal-img-wrap .load-err { font-size: 48px; }

        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #a0784a;
            margin-bottom: 8px;
            font-weight: 800;
        }
        .ingredients-list { list-style: none; margin-bottom: 20px; }
        .ingredients-list li {
            font-size: 15px;
            padding: 8px 0;
            border-bottom: 1px dashed #e0c99a;
            color: #3a2510;
            display: flex;
            justify-content: space-between;
        }
        .ingredients-list li .ing-name::before { content: "• "; color: #c0522a; font-weight: bold; }
        .ingredients-list li .ing-amount { color: #7a4e2d; font-weight: 600; font-size: 14px; }

        .instructions-text {
            font-size: 15px;
            line-height: 1.65;
            color: #3a2510;
            background: #f0e6d2;
            padding: 14px;
            border-radius: 12px;
            border-left: 4px solid #c0522a;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <h1>🥃 Cocktail Menü</h1>
    <p>Wähle ein Getränk für das Rezept</p>
</header>

<div class="grid-container" id="menuGrid"></div>

<div class="modal" id="recipeModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            <div class="modal-title" id="modalTitle">Cocktail</div>
            <button class="close-btn" onclick="toggleModal(false)" aria-label="Schließen">&times;</button>
        </div>
        <div class="modal-body">
            <div class="modal-img-wrap" id="modalImgWrap">
                <div class="spinner"></div>
            </div>
            <div class="section-title">Zutaten</div>
            <ul class="ingredients-list" id="modalIngredients"></ul>
            <div class="section-title">Zubereitung</div>
            <div class="instructions-text" id="modalInstructions"></div>
        </div>
    </div>
</div>

<script>
const drinks = Object.freeze({
    cola_bucket: {
        title: "Cola Bucket",
        ingredients: [
            { name: "Whiskey", amount: "4 cl" },
            { name: "Cola", amount: "nach Belieben (~150 ml)" },
            { name: "Zitronenscheibe", amount: "1 Stück" },
            { name: "Eiswürfel", amount: "reichlich" }
        ],
        instructions: "Das Glas komplett mit Eiswürfeln füllen. 4 cl Whiskey dazugeben, eine Zitronenscheibe hineinlegen und mit Cola auffüllen.",
        imagePrompt: "vintage retro illustration of a cola whiskey cocktail in a tall glass with ice and lemon slice, warm amber tones, 1950s bar poster style, distressed texture"
    },
    highball: {
        title: "Highball",
        ingredients: [
            { name: "Whiskey", amount: "4 cl" },
            { name: "Sprudelwasser", amount: "120 ml" },
            { name: "Zitronenscheiben", amount: "2 Stück" },
            { name: "Eiswürfel", amount: "reichlich" }
        ],
        instructions: "Das Glas mit reichlich Eis füllen. 4 cl Whiskey über das Eis gießen, zwei Zitronenscheiben hinzugeben und mit Sprudelwasser aufgießen.",
        imagePrompt: "vintage retro illustration of a whiskey highball cocktail with sparkling water and lemon in a tall glass, warm sepia tones, 1950s bar poster style, distressed texture"
    },
    long_island: {
        title: "Long Island Iced Tea",
        ingredients: [
            { name: "Whiskey", amount: "3 cl" },
            { name: "Zitronen-Eistee", amount: "150 ml" },
            { name: "Zitronenscheiben", amount: "2 Stück" },
            { name: "Eiswürfel", amount: "reichlich" }
        ],
        instructions: "Eiswürfel in das Glas geben. 3 cl Whiskey einschenken, die Zitronenscheiben hinzufügen und das Glas mit Zitronen-Eistee auffüllen.",
        imagePrompt: "vintage retro illustration of a long island iced tea cocktail with lemon slices in a tall glass, golden amber colors, 1950s diner style illustration, distressed texture"
    },
    whiskey_forest: {
        title: "Whiskey Forest",
        ingredients: [
            { name: "Whiskey", amount: "3 cl" },
            { name: "Blue Curaçao", amount: "2 cl" },
            { name: "Traubenlimonade (violett)", amount: "100 ml" },
            { name: "Eiswürfel", amount: "reichlich" }
        ],
        instructions: "Das Glas mit Eis füllen und zur Hälfte mit violetter Traubenlimonade füllen. 3 cl Whiskey und 2 cl Blue Curaçao im Shaker mixen und vorsichtig als obere Schicht eingießen.",
        imagePrompt: "vintage retro illustration of a layered cocktail with deep violet and blue colors in a tall glass, mysterious forest atmosphere, 1940s cocktail bar poster style, distressed texture"
    },
    coastline: {
        title: "Coastline",
        ingredients: [
            { name: "Whiskey", amount: "3 cl" },
            { name: "Blue Curaçao", amount: "2 cl" },
            { name: "Klare Zitronenlimonade", amount: "120 ml" },
            { name: "Eiswürfel", amount: "reichlich" }
        ],
        instructions: "Eis ins Glas geben. 2 cl Blue Curaçao hineingießen. Mit 120 ml klarer Limonade auffüllen und als optisches Highlight 3 cl Whiskey oben aufsetzen.",
        imagePrompt: "vintage retro illustration of a blue ocean layered cocktail with whiskey float in a tall glass, ocean blue and amber tones, 1950s seaside bar poster, distressed texture"
    },
    sunset: {
        title: "Sunset",
        ingredients: [
            { name: "Whiskey", amount: "3 cl" },
            { name: "Orangensaft", amount: "100 ml" },
            { name: "Grenadine", amount: "1 cl" },
            { name: "Eiswürfel", amount: "reichlich" }
        ],
        instructions: "Das Glas mit Eiswürfeln und 100 ml Orangensaft füllen. 1 cl Grenadine am Rand einfließen lassen, sodass er nach unten sinkt. Mit 3 cl Whiskey als obere Schicht vollenden.",
        imagePrompt: "vintage retro illustration of a sunset whiskey cocktail with orange juice and grenadine layers, golden orange red gradient in tall glass, 1950s summer bar poster style, distressed texture"
    },
    strong_whiskey: {
        title: "Strong Whiskey",
        ingredients: [
            { name: "Whiskey", amount: "4 cl" },
            { name: "Bier", amount: "200 ml" },
            { name: "Eiswürfel", amount: "reichlich" }
        ],
        instructions: "Ein Glas mit Eis füllen. 4 cl Whiskey einschenken und anschließend langsam 200 ml kühles Bier aufgießen, bis eine schöne Schaumkrone entsteht.",
        imagePrompt: "vintage retro illustration of a whiskey beer cocktail with foam in a large glass, warm golden amber tones, rugged 1940s saloon bar poster style, distressed texture"
    },
    whiskey_sour: {
        title: "Whiskey Sour",
        ingredients: [
            { name: "Whiskey", amount: "5 cl" },
            { name: "Limetten-Limonade", amount: "120 ml" },
            { name: "Eiswürfel", amount: "reichlich" }
        ],
        instructions: "Reichlich Eiswürfel ins Glas geben. 5 cl Whiskey hinzufügen und mit 120 ml spritziger Limetten-Limonade auffüllen.",
        imagePrompt: "vintage retro illustration of a whiskey sour cocktail with lime in a rocks glass, citrus green and amber tones, 1950s cocktail lounge poster style, distressed texture"
    },
    irish_coffee: {
        title: "Irish Coffee",
        ingredients: [
            { name: "Whiskey", amount: "4 cl" },
            { name: "Gekühlter schwarzer Kaffee", amount: "150 ml" },
            { name: "Eiswürfel", amount: "reichlich" }
        ],
        instructions: "Eiswürfel ins Glas geben, 4 cl Whiskey hinzufügen und mit 150 ml kaltem, kräftigem Kaffee auffüllen.",
        imagePrompt: "vintage retro illustration of an iced irish coffee cocktail with whiskey and black coffee in a glass, dark rich brown tones, 1950s coffee bar poster style, distressed texture"
    }
});

// Image cache
const imageCache = {};

async function generateImage(key, prompt) {
    if (imageCache[key]) return imageCache[key];

    const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 1000,
            messages: [{
                role: "user",
                content: `Generate a square cocktail illustration image. Style: ${prompt}. Return ONLY a data URI of an SVG illustration that looks like a vintage/retro bar poster. No explanation, no markdown, just the raw SVG code starting with <svg.`
            }]
        })
    });
    const data = await response.json();
    const svgText = data.content?.find(b => b.type === "text")?.text?.trim() || "";
    const clean = svgText.startsWith("<svg") ? svgText : svgText.replace(/^```[a-z]*\n?/, "").replace(/```$/, "").trim();
    const dataUri = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(clean);
    imageCache[key] = dataUri;
    return dataUri;
}

// Build grid
const grid = document.getElementById('menuGrid');
const cardImgWraps = {};

Object.keys(drinks).forEach(key => {
    const drink = drinks[key];
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => openRecipe(key);

    const imgWrap = document.createElement('div');
    imgWrap.className = 'card-img-wrap';
    imgWrap.innerHTML = '<div class="spinner"></div>';
    cardImgWraps[key] = imgWrap;

    const title = document.createElement('div');
    title.className = 'card-title';
    title.textContent = drink.title;

    card.appendChild(imgWrap);
    card.appendChild(title);
    grid.appendChild(card);

    // Load image in background
    generateImage(key, drink.imagePrompt).then(uri => {
        imgWrap.innerHTML = `<img src="${uri}" alt="${drink.title}">`;
    }).catch(() => {
        imgWrap.innerHTML = '<span class="load-err">🥃</span>';
    });
});

function openRecipe(key) {
    const drink = drinks[key];

    document.getElementById('modalTitle').textContent = drink.title;
    document.getElementById('modalInstructions').textContent = drink.instructions;

    const ingList = document.getElementById('modalIngredients');
    ingList.innerHTML = '';
    drink.ingredients.forEach(ing => {
        const li = document.createElement('li');
        li.innerHTML = `<span class="ing-name">${ing.name}</span><span class="ing-amount">${ing.amount}</span>`;
        ingList.appendChild(li);
    });

    const imgWrap = document.getElementById('modalImgWrap');
    if (imageCache[key]) {
        imgWrap.innerHTML = `<img src="${imageCache[key]}" alt="${drink.title}">`;
    } else {
        imgWrap.innerHTML = '<div class="spinner"></div>';
        generateImage(key, drink.imagePrompt).then(uri => {
            imgWrap.innerHTML = `<img src="${uri}" alt="${drink.title}">`;
        }).catch(() => {
            imgWrap.innerHTML = '<span class="load-err">🥃</span>';
        });
    }

    document.querySelector('.modal-content').scrollTop = 0;
    toggleModal(true);
}

function toggleModal(show) {
    const modal = document.getElementById('recipeModal');
    if (show) {
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
    } else {
        modal.classList.remove('active');
        document.body.style.overflow = '';
    }
}

function closeModal(event) {
    if (event.target === document.getElementById('recipeModal')) toggleModal(false);
}
</script>
</body>
</html>
